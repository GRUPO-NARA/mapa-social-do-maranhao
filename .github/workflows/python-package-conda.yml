name: Pipeline de dados

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Rodar pipeline
        env:
          SQLALCHEMY_URI: ${{ secrets.SQLALCHEMY_URI }}
          PIPELINE_HOSTS_INSEGUROS: dataimesc.imesc.ma.gov.br
          PIPELINE_AGENDADOR_ATIVADO: "false"
          PIPELINE_EXECUCAO_AUTOMATICA: "true"
          PIPELINE_COLETA_CONCORRENCIA: "1"
          PIPELINE_COLETA_TENTATIVAS: "6"
          PIPELINE_COLETA_TIMEOUT_SEGUNDOS: "60"
          PIPELINE_COLETA_BACKOFF_BASE_SEGUNDOS: "2"
        run: python pipeline/main.py
