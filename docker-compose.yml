services:
  database:
    image: postgres:15
    restart: always
    ports:
      - "5430:${DB_PORT}"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_HOST: ${DB_HOST}
      POSTGRES_PORT: ${DB_PORT}
    volumes:
      - pgdata:/var/lib/postgresql/data
  pgadimin:
    image: dpage/pgadmin4
    container_name: pgadmin_mapa_social
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
        - database

  datapipeline:
    build: ETL
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@database:5432/${DB_NAME}
    depends_on:
      - database

volumes:
  pgdata: