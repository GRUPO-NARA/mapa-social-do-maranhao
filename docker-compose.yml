name: mapa-social-do-maranhao

services:
  banco_de_dados:
    image: postgres:14.23-trixie
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rede-mapa
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline:
    build:
      context: ./pipeline
    environment:
      SQLALCHEMY_URI: ${SQLALCHEMY_URI}
      PIPELINE_HOSTS_INSEGUROS: ${PIPELINE_HOSTS_INSEGUROS:-dataimesc.imesc.ma.gov.br}
      PIPELINE_AGENDADOR_ATIVADO: "false"
      PIPELINE_AGENDADOR_INTERVALO: ${PIPELINE_AGENDADOR_INTERVALO:-2}
      PIPELINE_EXECUCAO_AUTOMATICA: "true"
    networks:
      - rede-mapa
    depends_on:
      banco_de_dados:
        condition: service_healthy

  pipeline-agendador:
    build:
      context: ./pipeline
    environment:
      SQLALCHEMY_URI: ${SQLALCHEMY_URI}
      PIPELINE_HOSTS_INSEGUROS: ${PIPELINE_HOSTS_INSEGUROS:-dataimesc.imesc.ma.gov.br}
      PIPELINE_AGENDADOR_ATIVADO: "true"
      PIPELINE_AGENDADOR_INTERVALO: ${PIPELINE_AGENDADOR_INTERVALO:-60}
      PIPELINE_EXECUCAO_AUTOMATICA: "false"
    restart: unless-stopped
    networks:
      - rede-mapa
    depends_on:
      banco_de_dados:
        condition: service_healthy
      pipeline:
        condition: service_completed_successfully

  api-python:
    build:
      context: ./api_python
    ports:
      - "8000:8000"
    expose:
      - "8000"
    networks:
      - rede-mapa
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      pipeline:
        condition: service_completed_successfully

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      BACKEND_PORT: ${BACKEND_PORT}
      BACKEND_HOST: ${BACKEND_HOST}
      ENDERECOS_PERMITIDOS: ${ENDERECOS_PERMITIDOS:-http://localhost:3000}
      HABILITAR_DOCUMENTACAO_SWAGGER: ${HABILITAR_DOCUMENTACAO_SWAGGER:-false}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      PYTHON_API_URL: http://api-python:8000
    ports:
      - "8080:8080"
    networks:
      - rede-mapa
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      banco_de_dados:
        condition: service_healthy
      pipeline:
        condition: service_completed_successfully
      api-python:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    networks:
      - rede-mapa
    depends_on:
      backend:
        condition: service_healthy
volumes:
  postgres_data: {}

networks:
  rede-mapa:
    driver: bridge
