<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Social do Maranhão</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script src="script.js" defer></script>

    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

</head>

<body>
    <div class="painel-principal">
        <header class="cabecalho">
            <div class="lado-esquerdo">
                <img src="logo.png" alt="" id="logo">
                <div class="titulo-subtitulo">
                    <h3>
                        Mapa Social do Maranhão
                    </h3>
                    <p>
                        Indicadores Sociais do Estado do Maranhão
                    </p>
                </div>
            </div>
            <div class="lado-direito">
                <a href="https://github.com/synapseLEA/mapa-social-MA">Sobre</a>    
                <a href="">Contato</a>
            </div>
        </header>

        <nav>
            <ul class="menu-indicadores">
                <li>
                    <a href="">Home</a>
                    <a href="">Educação</a>
                    <a href="">Saúde</a>
                    <a href="">Assistência Social</a>
                </li>
            </ul>
        </nav>

        <main class="foco-principal">
            <div class="filtros">
                <h3>
                    Filtrar Dados
                </h3>

                <div class="filtros-indicadores">
                    <div class="filtrar-tema">
                        <label for="f-tema">Tema:<br></label>
                        <select name="tema" id="f-tema">
                            <option value="">Escolha um tema</option>
                        </select>
                    </div>

                    <div class="filtrar-municipios">
                        <label for="f-municipios">Município:<br></label>

                        <select name="municipios" id= "f-municipios">
                            <option value="">Escolha um município</option>
                        </select> 
                        
                    </div>

                    <div class="filtrar-ano">
                        <label for="f-ano">Ano:<br></label>
                        <select name="ano" id="f-ano">
                            <option value="">Escolha um ano</option>
                        </select>
                    </div>
                </div>
                <div class="botao-filtro">
                        <button id="botao" type="button" style="display: block; margin: 0 auto;">Aplicar Filtros</button>
                </div>  
            </div>
            

            <div id="mapa"></div>

            <div class="indicadores">
                <h3>
                    Área de dados principal
                </h3>
            </div>
            <div class="card-1">
                <h3>
                    Área de dados 1
                </h3>
            </div>
            <div class="card-2">
                 <h3>
                    Área de dados 2
                </h3>
            </div>
               
            <div class="card-3">
                <h3>
                    Área de dados 3
                </h3>
            </div>
    
        </main>
    </div>
</body>

</html>
