server.port=${BACKEND_PORT:8080}
server.address=${BACKEND_HOST:0.0.0.0}
spring.application.name=backend

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

app.cors.allowed-origins=${ENDERECOS_PERMITIDOS:http://localhost:3000}
app.docs.enabled=${HABILITAR_DOCUMENTACAO_SWAGGER:false}
api.python.url=${PYTHON_API_URL:http://localhost:8000}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.default_schema=dados_estadual

management.endpoints.web.exposure.include=health

resilience4j.ratelimiter.instances.RateLimiter.limit-for-period=100                                                                                                                                  
resilience4j.ratelimiter.instances.RateLimiter.limit-refresh-period=5s
resilience4j.ratelimiter.instances.RateLimiter.timeout-duration=0s
